name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'SynthAIPro/**'
      - '.github/workflows/android-apk.yml'

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: SynthAIPro

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: SynthAIPro/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install web dependencies
        run: npm install

      - name: Install Capacitor Android toolchain
        run: npm install --save-dev @capacitor/cli @capacitor/core @capacitor/android

      - name: Build web app
        run: npm run build

      - name: Generate Android project
        run: npx cap add android

      - name: Sync Android project
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SynthAIPro-debug-apk
          path: SynthAIPro/android/app/build/outputs/apk/debug/app-debug.apk
